      </div>
    </div>

    <div class="card">
      <div class="card-title">Price Comparison \u2014 ${activeMarket ? activeMarket.flag+' '+activeMarket.name : ''}</div>
      ${piRenderComparisonTable(filteredPrices, marketComps, m, skus)}
    </div>
  `;
}

function piGetCountriesWithPrices(prices) {
  return [...new Set(prices.map(p => p.countryOrigin).filter(Boolean))].sort();
}

function piGetCategories(prices) {
  return [...new Set(prices.map(p => p.category).filter(Boolean))].sort();
}

function piCalculateGap(ourPrice, theirPrice) {
  if (!ourPrice || !theirPrice) return null;
  return ((ourPrice - theirPrice) / theirPrice * 100);
}

function piRenderComparisonTable(prices, competitors, marketId, skus) {
  if (!prices.length) {
    return `<div class="empty-state">
      <div class="empty-state-icon">&#x1F4CA;</div>
      <p>No competitor data yet for this market.</p>
      <p style="margin-top:8px;font-size:13px;color:var(--text-muted)">Upload a price list to start comparing!</p>
    </div>`;
  }

  // Group by countryOrigin + category
  const groups = {};
  prices.forEach(p => {
    const key = (p.countryOrigin||'Unknown') + '|' + (p.category||'Uncategorized');
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });

  // Find our SKU prices for matching
  const ourPrices = {};
  skus.forEach(s => {
    const country = findById(KEYS.countries, s.countryId);
    const grade = findById(KEYS.grades, s.gradeId);
    if (country && grade) {
      const key = country.name + '|' + grade.name;
      const mp = s.marketPrices && s.marketPrices[marketId];
      const price = mp ? mp.sellingPrice : (marketId === 'TH' ? s.sellingPrice : null);
      if (price) {
        if (!ourPrices[key]) ourPrices[key] = [];
        ourPrices[key].push(price);
      }
    }
  });

  let html = `<div class="table-wrapper"><table>
    <thead><tr>
      <th>Origin</th><th>Category</th><th>80+ Avg</th><th>Comp. Avg</th><th>Gap</th><th>Competitors</th><th style="min-width:160px">Visual</th>
    </tr></thead><tbody>`;

  const sortedKeys = Object.keys(groups).sort();
  sortedKeys.forEach(key => {
    const [countryOrigin, category] = key.split('|');
    const groupPrices = groups[key];

    // Competitor average
    const compAvg = groupPrices.reduce((s,p) => s + (parseFloat(p.price)||0), 0) / groupPrices.length;

    // Our average
    const ourArr = ourPrices[key] || [];
    const ourAvg = ourArr.length ? ourArr.reduce((s,v) => s+v, 0) / ourArr.length : null;

    const gap = piCalculateGap(ourAvg, compAvg);
    const gapClass = gap === null ? '' : gap > 2 ? 'gap-negative' : gap < -2 ? 'gap-positive' : 'gap-neutral';
    const gapStr = gap === null ? '\u2014' : (gap > 0 ? '+' : '') + gap.toFixed(1) + '%';

    // Bar widths
    const maxVal = Math.max(ourAvg || 0, compAvg || 0, 1);
    const ourW = ourAvg ? (ourAvg / maxVal * 100) : 0;
    const compW = compAvg ? (compAvg / maxVal * 100) : 0;

    // Competitor tags
    const compIds = [...new Set(groupPrices.map(p => p.competitorId))];
    const tags = compIds.map(cid => {
      const c = competitors.find(x => x.id === cid);
      return c ? `<span class="competitor-tag ${c.type||''}">${escHtml(c.name)}</span>` : '';
    }).join('');

    const market = (getAll(KEYS.markets).find(mk=>mk.id===marketId)||{});
    const cur = market.currency || 'THB';

    html += `<tr class="comparison-row">
      <td>${escHtml(countryOrigin)}</td>
      <td>${escHtml(category)}</td>
      <td style="font-family:'JetBrains Mono';font-size:13px">${ourAvg ? ourAvg.toFixed(2)+' '+cur : '<span style="color:var(--text-muted)">\u2014</span>'}</td>
      <td style="font-family:'JetBrains Mono';font-size:13px">${compAvg.toFixed(2)} ${cur}</td>
      <td class="${gapClass}" style="font-family:'JetBrains Mono';font-size:13px">${gapStr}</td>
      <td>${tags}</td>
      <td>
        <div class="price-bar-wrapper" style="flex-direction:column;align-items:stretch;gap:2px">
          <div style="display:flex;align-items:center;gap:4px"><div class="price-bar-80p" style="width:${ourW}%;height:10px"></div><span style="font-size:10px;color:var(--text-muted)">80+</span></div>
          <div style="display:flex;align-items:center;gap:4px"><div class="price-bar-comp" style="width:${compW}%;height:10px"></div><span style="font-size:10px;color:var(--text-muted)">Comp</span></div>
        </div>
      </td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  return html;
}

let _piUploadState = { step:1, file:null, headers:[], rows:[], mapping:{}, competitorId:'', parsedRecords:[] };

        <button class="btn btn-primary" onclick="closeModal();showCompetitorManager()">Add Competitor</button>
      </div>`);
    return;
  }

  _piRenderUploadStep();

function _piRenderUploadStep() {
  const m = state.piMarket;
  const market = (getAll(KEYS.markets).find(mk=>mk.id===m)||{});
  const marketComps = getAll(KEYS.competitors).filter(c => c.marketId === m);
  const us = _piUploadState;

  if (us.step === 1) {
    showModal(`<h3>&#x1F4E4; Upload Price List \u2014 ${market.flag||''} ${market.name||m}</h3>
      <div class="form-group">
        <label class="form-label">Competitor</label>
        <select id="piUploadComp" onchange="_piUploadState.competitorId=this.value">
          <option value="">Select competitor...</option>
          ${marketComps.map(c => `<option value="${c.id}" ${us.competitorId===c.id?'selected':''}>${escHtml(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="upload-zone" id="piDropZone" onclick="document.getElementById('piFileInput').click()"
           ondragover="event.preventDefault();this.classList.add('dragover')"
           ondragleave="this.classList.remove('dragover')"
           ondrop="event.preventDefault();this.classList.remove('dragover');_piHandleFile(event.dataTransfer.files[0])">
        <div class="upload-zone-icon">&#x1F4C1;</div>
        <div class="upload-zone-text">${us.file ? escHtml(us.file.name) : 'Drop .xlsx or .csv file here'}</div>
        <div class="upload-zone-hint">${us.file ? us.rows.length+' rows detected' : 'or click to browse'}</div>
      </div>
      <input type="file" id="piFileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="_piHandleFile(this.files[0])">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="_piUploadNext()" ${!us.file||!us.competitorId?'disabled':''}>Next: Map Columns</button>
      </div>`);
  } else if (us.step === 2) {
    const colOpts = ['Skip','Product Name','Country Origin','Region','Process','Grade/Category','Price','Currency','Unit','Notes'];
    showModal(`<h3>&#x1F5C2; Map Columns</h3>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Assign each column from the file to a field. We detected ${us.headers.length} columns.</p>
      <div class="mapping-grid">
        ${us.headers.map((h, i) => `
          <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(h)}">${escHtml(h)}</div>
          <div class="col-arrow">\u2192</div>
          <select id="piMap_${i}" onchange="_piUploadState.mapping[${i}]=this.value" style="padding:6px 8px;font-size:12px">
            ${colOpts.map(o => `<option value="${o}" ${us.mapping[i]===o?'selected':''}>${o}</option>`).join('')}
          </select>
        `).join('')}
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="_piUploadState.step=1;_piRenderUploadStep()">Back</button>
        <button class="btn btn-primary" onclick="_piUploadNext()">Next: Preview</button>
      </div>`);
    // Auto-guess mappings
    _piAutoGuessMapping();
  } else if (us.step === 3) {
    const recs = us.parsedRecords;
    const shown = recs.slice(0, 20);
    showModal(`<h3>&#x1F50D; Preview (${recs.length} records)</h3>
      <div class="table-wrapper" style="max-height:350px;overflow-y:auto">
        <table style="font-size:12px">
          <thead><tr><th>Product</th><th>Country</th><th>Category</th><th>Price</th><th>Currency</th></tr></thead>
          <tbody>
            ${shown.map(r => `<tr>
              <td>${escHtml(r.productName||'')}</td>
              <td>${escHtml(r.countryOrigin||'')}</td>
              <td>${escHtml(r.category||'')}</td>
              <td style="font-family:'JetBrains Mono'">${r.price||'\u2014'}</td>
              <td>${escHtml(r.currency||'')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      ${recs.length > 20 ? `<p style="font-size:12px;color:var(--text-muted);margin-top:8px">Showing 20 of ${recs.length} records</p>` : ''}

        <button class="btn btn-secondary" onclick="_piUploadState.step=2;_piRenderUploadStep()">Back</button>
        <button class="btn btn-primary" onclick="_piConfirmUpload()">Confirm &amp; Import ${recs.length} Records</button>
      </div>`);
  }
}

function _piHandleFile(file) {
  if (!file) return;
  _piUploadState.file = file;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (data.length < 2) { showToast('File appears empty or has only headers','error'); return; }
      _piUploadState.headers = data[0].map(h => String(h).trim());
      _piUploadState.rows = data.slice(1).filter(r => r.some(c => c !== ''));
      _piUploadState.mapping = {};
      _piRenderUploadStep(); // re-render step 1 with file info
    } catch (err) { showToast('Failed to parse file: ' + err.message, 'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function _piAutoGuessMapping() {
  const headers = _piUploadState.headers;
  const guesses = {
    'product':'Product Name', 'item':'Product Name', 'name':'Product Name', 'coffee':'Product Name', 'description':'Product Name',
    'country':'Country Origin', 'origin':'Country Origin',
    'region':'Region', 'area':'Region', 'farm':'Region',
    'process':'Process', 'method':'Process',
    'grade':'Grade/Category', 'category':'Grade/Category', 'type':'Grade/Category', 'tier':'Grade/Category',
    'price':'Price', 'cost':'Price', 'amount':'Price', 'sell':'Price', 'rate':'Price',
    'currency':'Currency', 'cur':'Currency',
    'unit':'Unit', 'uom':'Unit', 'weight':'Unit', 'size':'Unit', 'kg':'Unit',
    'note':'Notes', 'remark':'Notes', 'comment':'Notes'
  };
  headers.forEach((h, i) => {
    const lower = h.toLowerCase();
    for (const [keyword, field] of Object.entries(guesses)) {
      if (lower.includes(keyword)) {
        // Only set if not already mapped to this field
        const alreadyMapped = Object.values(_piUploadState.mapping).includes(field);
        if (!alreadyMapped) {
          _piUploadState.mapping[i] = field;
          const el = document.getElementById('piMap_' + i);
          if (el) el.value = field;
          break;
        }
      }
    }
    if (!_piUploadState.mapping[i]) _piUploadState.mapping[i] = 'Skip';
  });
}

function _piUploadNext() {
  const us = _piUploadState;
  if (us.step === 1) {
    if (!us.competitorId) { showToast('Select a competitor','error'); return; }
    us.competitorId = document.getElementById('piUploadComp').value;
    if (!us.file || !us.rows.length) { showToast('Upload a file first','error'); return; }
    us.step = 2;
    _piRenderUploadStep();
  } else if (us.step === 2) {
    // Read mapping from selects
    us.headers.forEach((h, i) => {
      const el = document.getElementById('piMap_' + i);
      if (el) us.mapping[i] = el.value;
    });
    // Check that at least Price is mapped
    const mappedFields = Object.values(us.mapping);
    if (!mappedFields.includes('Price')) { showToast('Map at least the Price column','error'); return; }
    // Build records
    us.parsedRecords = _piBuildRecords(us.headers, us.rows, us.mapping);
    if (!us.parsedRecords.length) { showToast('No valid records found','error'); return; }
    us.step = 3;
    _piRenderUploadStep();
  }
}

function _piBuildRecords(headers, rows, mapping) {
  const fieldMap = {};
  Object.entries(mapping).forEach(([idx, field]) => {
    if (field !== 'Skip') fieldMap[field] = parseInt(idx);
  });

  return rows.map(row => {
    const price = parseFloat(row[fieldMap['Price']]);
    if (isNaN(price) || price <= 0) return null;
    return {
      productName: fieldMap['Product Name'] != null ? String(row[fieldMap['Product Name']]||'').trim() : '',
      countryOrigin: fieldMap['Country Origin'] != null ? String(row[fieldMap['Country Origin']]||'').trim() : '',
      region: fieldMap['Region'] != null ? String(row[fieldMap['Region']]||'').trim() : '',
      process: fieldMap['Process'] != null ? String(row[fieldMap['Process']]||'').trim() : '',
      category: fieldMap['Grade/Category'] != null ? String(row[fieldMap['Grade/Category']]||'').trim() : '',
      price: price,
      currency: fieldMap['Currency'] != null ? String(row[fieldMap['Currency']]||'').trim() : (getAll(KEYS.markets).find(mk=>mk.id===state.piMarket)||{}).currency || '',
      unit: fieldMap['Unit'] != null ? String(row[fieldMap['Unit']]||'').trim() : '',
      notes: fieldMap['Notes'] != null ? String(row[fieldMap['Notes']]||'').trim() : '',
    };
  }).filter(Boolean);
}

function _piConfirmUpload() {
  const us = _piUploadState;
  const existing = getAll(KEYS.competitorPrices);
  const now = new Date().toISOString();
  const newRecords = us.parsedRecords.map(r => ({
    id: DB.genId(),
    competitorId: us.competitorId,
    productName: r.productName,
    countryOrigin: r.countryOrigin,
    region: r.region,
    process: r.process,
    category: r.category,
    price: r.price,
    currency: r.currency,
    unit: r.unit,
    notes: r.notes,
    uploadedAt: now,
  }));

  DB.set(KEYS.competitorPrices, existing.concat(newRecords));

  // Update competitor's lastUploadAt
  const competitors = getAll(KEYS.competitors);
  const comp = competitors.find(c => c.id === us.competitorId);
  if (comp) { comp.lastUploadAt = now; DB.set(KEYS.competitors, competitors); }

  showToast(`Imported ${newRecords.length} price records`);
  closeModal();
  renderPriceIntel();
}

                const totalFob = fob * (item.totalQty || 0);
                // Store calculated prices
                item.fobPerKg = fobKg;
                item.costPriceTHB = Math.round(costThb);
                item.sellPriceTHB = Math.round(sellThb);
                item.totalFobUSD = Math.round(totalFob);
                return `<tr>
                  <td style="color:var(--text-muted);font-size:11px">${idx+1}</td>
                  <td style="font-size:12px">${escHtml(item.saleName || item.autoName)}</td>
                  <td class="price-cell">${fob.toFixed(2)}</td>
                  <td class="price-cell">${fobKg.toFixed(2)}</td>
                  <td class="price-cell" style="font-weight:700;color:var(--heritage-blue)">${Math.round(costThb).toLocaleString()}</td>
                  <td class="price-cell" style="font-weight:700;color:var(--success)">${Math.round(sellThb).toLocaleString()}</td>
                  <td class="price-cell">
                    <select style="font-size:11px;padding:2px 4px;width:65px" onchange="contractUpdateItem(${idx},'margin',parseFloat(this.value));renderContract()">
                      <option value="1.20" ${margin===1.20?'selected':''}>20%</option>
                      <option value="1.25" ${margin===1.25?'selected':''}>25%</option>
                      <option value="1.30" ${margin===1.30?'selected':''}>30%</option>
                      <option value="1.35" ${margin===1.35?'selected':''}>35%</option>
                      <option value="1.40" ${margin===1.40?'selected':''}>40%</option>
                      <option value="1.50" ${margin===1.50?'selected':''}>50%</option>
                    </select>
                  </td>
                  <td class="price-cell">${Math.round(totalFob).toLocaleString()}</td>
                </tr>`;
              }).join('')}
            </tbody>
            <tfoot>
              <tr style="font-weight:700;border-top:2px solid var(--heritage-blue)">
                <td colspan="7" style="text-align:right">Total FOB (USD)</td>
                <td class="price-cell">${cd.items.reduce((s,i)=>s+(i.totalFobUSD||0),0).toLocaleString()}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    `;
  } else if (step === 4 && cd) {
    // STEP 4: Generate SKUs
    const skus = getAll(KEYS.skus);
    bodyHtml = `
      <div class="card">
        <div class="flex-between mb-16">
          <div class="card-title" style="margin-bottom:0">Generate SKUs — ${escHtml(cd.exporter)} (${cd.items.length} items)</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary btn-sm" onclick="contractGoStep(3)">← Back</button>
            <button class="btn btn-primary" onclick="contractCreateAllSkus()">Create All SKUs</button>
          </div>
        </div>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">Review the SKU assignments below. Existing SKUs will be reused. New SKUs will be generated.</p>
        <div class="table-wrapper" style="max-height:500px;overflow-y:auto">
          <table class="contract-items-table">
            <thead><tr>
              <th>#</th>
              <th>Product</th>
              <th>Grade</th>
              <th>Pack</th>
              <th>Supplier</th>
              <th style="text-align:right">Cost</th>
              <th style="text-align:right">Sell</th>
              <th>Status</th>
              <th>SKU Code</th>
            </tr></thead>
            <tbody>
              ${cd.items.map((item, idx) => {
                const existingSku = item.skuId ? skus.find(s=>s.id===item.skuId) : null;
                const statusCls = item.status === 'sku_created' ? 'created' : (item.status === 'skipped' ? 'skipped' : 'pending');
                return `<tr>
                  <td style="color:var(--text-muted);font-size:11px">${idx+1}</td>
                  <td style="font-size:12px">${escHtml(item.saleName || item.autoName)}</td>
                  <td>
                    <select style="font-size:11px;padding:2px;width:100%" onchange="contractUpdateItem(${idx},'gradeId',this.value)">
                      <option value="">—</option>
                      ${getAll(KEYS.grades).filter(g=>g.active).map(g=>`<option value="${g.id}" ${item.gradeId===g.id?'selected':''}>${escHtml(g.name)}</option>`).join('')}
                    </select>
                  </td>
                  <td>
                    <select style="font-size:11px;padding:2px;width:100%" onchange="contractUpdateItem(${idx},'packSizeId',this.value)">
                      <option value="">—</option>
                      ${getAll(KEYS.packSizes).filter(p=>p.active).map(p=>`<option value="${p.id}" ${item.packSizeId===p.id?'selected':''}>${escHtml(p.name)}</option>`).join('')}
                    </select>
                  </td>
                  <td>
                    <select style="font-size:11px;padding:2px;width:100%" onchange="contractUpdateItem(${idx},'supplierId',this.value)">
                      <option value="">—</option>
                      ${getAll(KEYS.suppliers).filter(s=>s.active).sort((a,b)=>a.name.localeCompare(b.name)).map(s=>`<option value="${s.id}" ${item.supplierId===s.id?'selected':''}>${escHtml(s.name)} (${s.code})</option>`).join('')}
                    </select>
                  </td>
                  <td class="price-cell">${item.costPriceTHB?item.costPriceTHB.toLocaleString():'—'}</td>
                  <td class="price-cell">${item.sellPriceTHB?item.sellPriceTHB.toLocaleString():'—'}</td>
                  <td><span class="status-dot ${statusCls}"></span>${item.status||'pending'}</td>
                  <td style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--heritage-blue)">${existingSku ? existingSku.skuCode : '—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  document.getElementById('contractTab').innerHTML = `
    <div style="margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:700;color:var(--heritage-blue)">Contract to SKU</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin-top:4px">Upload exporter contracts → auto-extract items → calculate pricing → generate SKUs</p>
    </div>
    <div class="contract-steps">${stepsHtml}</div>
    ${bodyHtml}
  `;
}

function contractGoStep(n) { state.contractStep = n; renderContract(); }

function contractFillFromProfile(profileId) {
  if (!profileId) return;
  const ep = getAll(KEYS.exporterProfiles).find(p=>p.id===profileId);
  if (!ep) return;
  const el = (id) => document.getElementById(id);
  if (el('contractExporter')) el('contractExporter').value = ep.name;
  if (el('contractCountry')) el('contractCountry').value = ep.countryId || '';
  if (el('contractPriceUnit')) el('contractPriceUnit').value = ep.priceUnit || 'USD/kg';
  if (el('contractShipping')) el('contractShipping').value = ep.shippingCost || 5;
  if (el('contractFx')) el('contractFx').value = ep.exchangeRate || 33;
}

function contractUpdateItem(idx, key, val) {
  if (state.contractData && state.contractData.items[idx]) {
    state.contractData.items[idx][key] = val;
  }
}

function contractHandleDrop(file) {
  if (!file) return;
  const exporter = document.getElementById('contractExporter')?.value.trim();
  const countryId = document.getElementById('contractCountry')?.value;
  const priceUnit = document.getElementById('contractPriceUnit')?.value || 'USD/kg';
  const shippingCost = parseFloat(document.getElementById('contractShipping')?.value) || 5;
  const exchangeRate = parseFloat(document.getElementById('contractFx')?.value) || 33;

  if (!exporter) { showToast('Please enter exporter name','error'); return; }
  if (!countryId) { showToast('Please select country','error'); return; }

  const country = findById(KEYS.countries, countryId);
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });

      // Auto-detect: find first row with numeric data (skip headers)
      let dataStart = 0;
      for (let i = 0; i < Math.min(rows.length, 10); i++) {
        if (rows[i].some(cell => typeof cell === 'number' && cell > 0)) { dataStart = i; break; }
      }

      const items = [];
      let currentExporter = exporter;
      for (let i = dataStart; i < rows.length; i++) {
        const r = rows[i];
        if (!r || r.length < 3) continue;

        // Detect exporter name in col A (if text with no numbers in other cols)
        if (typeof r[0] === 'string' && r[0].trim() && (r[0].trim().toLowerCase() === 'total' || r[0].trim().toLowerCase() === 'air')) continue;

        // Skip pure total rows
        if (typeof r[0] === 'string' && r[0].trim().toLowerCase() === 'total') continue;

        // Check if this looks like a data row (has a product name and some numeric value)
        const productName = (r[2] || r[1] || '').toString().trim();
        const hasPrice = r.some((cell, ci) => ci >= 3 && typeof cell === 'number' && cell > 0);
        if (!productName || !hasPrice) continue;

        // Extract fields
        const rowExporter = (r[0] || '').toString().trim();
        if (rowExporter && rowExporter !== 'Total') currentExporter = rowExporter;

        const productNo = (r[1] || '').toString().trim();
        const fobPrice = typeof r[4] === 'number' ? r[4] : (typeof r[3] === 'number' ? r[3] : 0);
        const totalQty = typeof r[3] === 'number' ? r[3] : (typeof r[5] === 'number' ? r[5] : 0);
        const seaQty = typeof r[11] === 'number' ? r[11] : null;
        const airQty = typeof r[12] === 'number' ? r[12] : null;
        const flavorNotes = (r[15] || '').toString().trim();

        // Auto name: Country + Exporter + Product Name
        const autoName = [country.name, currentExporter, productName].filter(Boolean).join(' ');

        items.push({
          id: DB.genId(),
          productNo,
          rawProductName: productName,
          autoName,
          saleName: '',
          saleNameLocked: false,
          fobPrice,
          totalQty,
          seaQty,
          airQty,
          flavorNotes,
          margin: 1.25,
          gradeId: '',
          packSizeId: '',
          supplierId: '',
          regionId: '',
          brandFarmId: '',
          processId: '',
          gradingSpecId: '',
          costPriceTHB: null,
          sellPriceTHB: null,
          skuId: null,
          status: 'pending'
        });
      }

      if (!items.length) { showToast('No data rows found in file','error'); return; }

      // Try to auto-match supplier: first from exporter profile, then by name
      const suppliers = getAll(KEYS.suppliers);
      const profileSelect = document.getElementById('contractProfileSelect');
      const selectedProfile = profileSelect?.value ? getAll(KEYS.exporterProfiles).find(p=>p.id===profileSelect.value) : null;
      const linkedSupplierId = selectedProfile?.supplierId;
      const matchedSupplier = linkedSupplierId ? suppliers.find(s=>s.id===linkedSupplierId) : suppliers.find(s => s.name.toLowerCase() === exporter.toLowerCase());

      if (matchedSupplier) {
        items.forEach(item => { item.supplierId = matchedSupplier.id; });
      }

      state.contractData = {
        id: DB.genId(),
        exporter: currentExporter || exporter,
        countryId,
        priceUnit,
        shippingCost,
        exchangeRate,
        originalFileName: file.name,
        items,
        status: 'draft',
        createdAt: new Date().toISOString()
      };

      state.contractStep = 2;
      showToast(`Extracted ${items.length} items from ${file.name}`);
      renderContract();
    } catch (err) {
      console.error('Contract parse error:', err);
      showToast('Failed to parse file: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function contractLoad(contractId) {
  const contracts = getAll(KEYS.contracts);
  const c = contracts.find(x => x.id === contractId);
  if (c) {
    state.contractData = JSON.parse(JSON.stringify(c)); // deep clone
    state.contractStep = 2;
    renderContract();
  }
}

async function contractCreateAllSkus() {
  const cd = state.contractData;
  if (!cd) return;

  const pendingItems = cd.items.filter(i => i.status === 'pending');
  const incomplete = pendingItems.filter(i => !i.gradeId || !i.packSizeId || !i.supplierId);
  if (incomplete.length) {
    showToast(`${incomplete.length} items missing Grade, Pack, or Supplier. Please fill all required fields.`, 'error');
    return;
  }

  const country = findById(KEYS.countries, cd.countryId);
  if (!country) { showToast('Country not found', 'error'); return; }

  let skus = getAll(KEYS.skus);
  let created = 0;

  for (const item of pendingItems) {
    const grade = findById(KEYS.grades, item.gradeId);
    const pack = findById(KEYS.packSizes, item.packSizeId);
    const supplier = findById(KEYS.suppliers, item.supplierId);
    const region = findById(KEYS.regions, item.regionId);
    const brandFarm = findById(KEYS.brandFarms, item.brandFarmId);
    const process = findById(KEYS.processes, item.processId);
    const process2 = findById(KEYS.processes, item.process2Id);
    const gradingSpec = findById(KEYS.gradingSpecs, item.gradingSpecId);

    if (!grade || !pack || !supplier) continue;

    const running = getNextRunningFromList(skus, supplier.code);
    if (running > 99) { showToast(`Supplier ${supplier.name} max 99 reached`, 'warning'); continue; }

    const skuCode = buildSku(country.code, grade.code, pack.code, supplier.code, running);
    const settings = DB.get(KEYS.settings);
    const lotNumber = buildLot(settings.nextLotNumber);
    const description = buildDescription(country.name, region?.name, brandFarm?.name, process?.name, process2?.name, gradingSpec?.name, supplier.name, grade.name, pack.name);
    const saleName = item.saleName || item.autoName;
    const createdAt = new Date().toISOString();

    const newSku = {
      id: DB.genId(),
      notionId: '',
      skuCode, lotNumber,
      countryId: cd.countryId, gradeId: item.gradeId, packSizeId: item.packSizeId,
      supplierId: item.supplierId, regionId: item.regionId || '', brandFarmId: item.brandFarmId || '',
      processId: item.processId || '', process2Id: item.process2Id || '', gradingSpecId: item.gradingSpecId || '',
      description, saleName,
      notes: item.flavorNotes || '',
      costPrice: item.costPriceTHB || null,
      sellingPrice: item.sellPriceTHB || null,
      currency: 'THB',
      contractId: cd.id,
      createdAt
    };

    skus.push(newSku);
    settings.nextLotNumber++;
    DB.set(KEYS.settings, settings);

    item.skuId = newSku.id;
    item.status = 'sku_created';
    created++;

    // Sync to Notion
    const notionPayload = {
      skuCode, lotNumber,
      country: country.name, countryCode: country.code,
      grade: grade.name, gradeCode: grade.code,
      packSize: pack.name, packCode: pack.code,
      supplier: supplier.name, supplierCode: supplier.code,
      region: region?.name || '', brandFarm: brandFarm?.name || '',
      process: process?.name || '', process2: process2?.name || '',
      gradingSpec: gradingSpec?.name || '',
      description, saleName, notes: item.flavorNotes || '',
      costPrice: item.costPriceTHB, sellingPrice: item.sellPriceTHB,
      currency: 'THB', createdAt
    };
    const result = await SYNC.createSku(notionPayload);
    if (result?.notionId) {
      newSku.notionId = result.notionId;
      newSku.id = result.notionId;
      item.skuId = result.notionId;
    }
  }

  DB.set(KEYS.skus, skus);

  // Save contract
  cd.status = 'confirmed';
  const contracts = getAll(KEYS.contracts);
  const existingIdx = contracts.findIndex(c => c.id === cd.id);
  if (existingIdx >= 0) contracts[existingIdx] = cd;
  else contracts.push(cd);
  DB.set(KEYS.contracts, contracts);

  showToast(`Created ${created} SKUs from contract`);
  renderContract();
}

function showModal(html) {
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">${html}</div>
    </div>
  `;
}
function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }

// ============================================================
// MANUAL SYNC
// ============================================================
async function manualSync() {
  if (SYNC.syncing) return;
  SYNC.syncing = true;
  SYNC.updateUI('syncing', 'Syncing...');
  await SYNC.init();
  SYNC.syncing = false;
}

// ============================================================
// SEED: Push existing local SKUs to Notion (one-time)
// ============================================================
async function seedToNotion() {
  if (!SYNC.enabled) { showToast('Notion not connected','error'); return; }
  const skus = getAll(KEYS.skus);
  if (!skus.length) { showToast('No local SKUs to seed','warning'); return; }
  if (!confirm(`Push ${skus.length} local SKUs to Notion? This is for initial setup only.`)) return;

  SYNC.updateUI('syncing', `Seeding ${skus.length} SKUs...`);
  const payloads = skus.map(s => {
    const country = findById(KEYS.countries, s.countryId);
    const grade = findById(KEYS.grades, s.gradeId);
    const pack = findById(KEYS.packSizes, s.packSizeId);
    const supplier = findById(KEYS.suppliers, s.supplierId);
    const region = findById(KEYS.regions, s.regionId);
    const brandFarm = findById(KEYS.brandFarms, s.brandFarmId);
    const process = findById(KEYS.processes, s.processId);
    const process2 = findById(KEYS.processes, s.process2Id);
    const gradingSpec = findById(KEYS.gradingSpecs, s.gradingSpecId);
    return {
      skuCode:s.skuCode, lotNumber:s.lotNumber,
      country:country?.name||'', countryCode:country?.code||'',
      grade:grade?.name||'', gradeCode:grade?.code||'',
      packSize:pack?.name||'', packCode:pack?.code||'',
      supplier:supplier?.name||'', supplierCode:supplier?.code||'',
      region:region?.name||'', brandFarm:brandFarm?.name||'',
      process:process?.name||'', process2:process2?.name||'',
      gradingSpec:gradingSpec?.name||'',
      description:s.description||'', saleName:s.saleName||'', notes:s.notes||'',
      costPrice:s.costPrice!=null?s.costPrice:null, sellingPrice:s.sellingPrice!=null?s.sellingPrice:null,
      currency:s.currency||'THB',
      createdAt:s.createdAt
    };
  });
  const results = await SYNC.bulkCreate(payloads);
  showToast(`Seeded ${results.length} SKUs to Notion`);
  await SYNC.init();
}
